        email: pi-ecommerce@hipay.com
  - name: HiPay Omnichannel Gateway API
    description: The HiPay Omnichannel Gateway API allows merchants to process in-store and omnichannel payments, manage orders and transactions without customer redirection, and perform maintenance operations such as refunds and cancellations on existing transactions.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com
    baseURL: https://secure-gateway.hipay-tpp.com/rest
    tags:
