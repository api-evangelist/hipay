  - Europe
  - Omnichannel
  - Point of Sale
  - Fraud Prevention
  - Tokenization
  - Marketplace
apis:
  - name: HiPay Payment Gateway API
    description: The HiPay Payment Gateway API (v3) allows merchants to get paid and manage orders and transactions. Supports querying orders, retrieving transactions by multiple identifiers, and discovering available payment products and routing options.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com/api-explorer/api-gateway
    baseURL: https://api-gateway.hipay.com
    tags:
      - Payments
      - Orders
      - Transactions
    properties:
      - type: Documentation
        url: https://developer.hipay.com/api-explorer/api-gateway
      - type: OpenAPI
        url: https://raw.githubusercontent.com/hipay/openapi-hipay/master/enterprise/api-gateway.yml
    contact:
      - FN: HiPay Support
        url: https://support.hipay.com
        email: pi-ecommerce@hipay.com
  - name: HiPay Enterprise Gateway API
    description: The HiPay Enterprise Gateway API (v1) enables payment processing and transaction management, supporting both credit/debit card payments and alternative payment methods. Provides order creation, transaction retrieval, and maintenance operations including capture, refund, and cancel.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com/api-explorer/api-online-payments
    baseURL: https://secure-gateway.hipay-tpp.com/rest
    tags:
      - Payments
      - Orders
      - Transactions
      - Refunds
    properties:
      - type: Documentation
        url: https://developer.hipay.com/api-explorer/api-online-payments
      - type: OpenAPI
        url: https://raw.githubusercontent.com/hipay/openapi-hipay/master/enterprise/gateway.yaml
    contact:
      - FN: HiPay Support
        url: https://support.hipay.com
        email: pi-ecommerce@hipay.com
  - name: HiPay Enterprise HostedPage API
    description: The HiPay Enterprise HostedPage API allows merchants to create secure, PCI-compliant hosted payment pages that customers can be redirected to or displayed in an iFrame. Supports multiple payment methods and customizable themes.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com/api-explorer/hpayment-api
    baseURL: https://api.hipay.com
    tags:
      - Payments
      - Hosted Page
      - PCI Compliance
    properties:
      - type: Documentation
        url: https://developer.hipay.com/api-explorer/hpayment-api
      - type: OpenAPI
        url: https://raw.githubusercontent.com/hipay/openapi-hipay/master/enterprise/hpayment.yaml
    contact:
      - FN: HiPay Support
        url: https://support.hipay.com
        email: pi-ecommerce@hipay.com
  - name: HiPay Enterprise Finance API
    description: The HiPay Enterprise Finance API consolidates sales and settlements for merchant accounts. Provides access to settlement details including amounts transferred to bank accounts, sales, refunds, fees, and chargebacks, with export in CSV, XLS, or TXT formats.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com
    baseURL: https://api.hipay-tpp.com/v1
    tags:
      - Finance
      - Settlements
      - Reporting
      - Reconciliation
    properties:
      - type: Documentation
        url: https://developer.hipay.com
      - type: OpenAPI
        url: https://raw.githubusercontent.com/hipay/openapi-hipay/master/enterprise/settlement.yaml
    contact:
      - FN: HiPay Support
        url: https://support.hipay.com
        email: pi-ecommerce@hipay.com
  - name: HiPay Enterprise Tokenization API
    description: The HiPay Enterprise Tokenization API enables merchants to securely tokenize payment card data in HiPay's Secure Vault, eliminating the need to store sensitive cardholder information locally. Includes a BIN lookup tool and supports create, retrieve, update, and delete operations on tokens.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com
    baseURL: https://secure2-vault.hipay-tpp.com/rest/v2/token
    tags:
      - Tokenization
      - Security
      - PCI Compliance
      - Vault
    properties:
      - type: Documentation
        url: https://developer.hipay.com
      - type: OpenAPI
        url: https://raw.githubusercontent.com/hipay/openapi-hipay/master/enterprise/tokenization.yaml
    contact:
