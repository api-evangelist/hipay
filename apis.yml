  - name: HiPay Marketplace API
    description: The HiPay Marketplace API facilitates connections between marketplace platforms and HiPay for split payment management. Supports user account creation (KYC/KYB onboarding), UBO declarations, banking information management, fund transfers, withdrawals, and transaction reporting for marketplace operators.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com
    baseURL: https://professional.hipay.com/api
