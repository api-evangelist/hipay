      - Wallets
    properties:
      - type: Documentation
        url: https://developer.hipay.com
      - type: OpenAPI
        url: https://raw.githubusercontent.com/hipay/openapi-hipay/master/enterprise/applepay-web.yaml
    contact:
      - FN: HiPay Support
        url: https://support.hipay.com
        email: pi-ecommerce@hipay.com
  - name: HiPay POS API
    description: The HiPay POS API enables in-store payments by waking point-of-sale terminal devices with payment details and creating corresponding transactions in HiPay Console. Supports omnichannel retail with seamless online-to-in-store payment flows.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com
    baseURL: https://cloudrun-api-n3l7nqotca-ew.a.run.app
    tags:
