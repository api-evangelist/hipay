        url: https://support.hipay.com
        email: pi-ecommerce@hipay.com
  - name: HiPay Apple Pay Web API
    description: The HiPay Apple Pay Web API enables merchants to request valid Apple Pay payment sessions from Apple servers, supporting Apple Pay integration in web applications for both online and in-store payment flows.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.hipay.com
